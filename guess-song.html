<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>估歌仔 · Guess the Song</title>
<style>
  :root{
    --bg:#0b0d12; --panel:#141821; --line:#242b38;
    --ink:#eef1f6; --dim:#7f8aa0; --accent:#ffd54a; --accent2:#ff5d73;
    --ok:#52e3a4;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"Trebuchet MS","Segoe UI",system-ui,sans-serif;
    background:radial-gradient(circle at 50% -10%,#1a2030,var(--bg) 60%);
    color:var(--ink); min-height:100%;
    display:flex; flex-direction:column; align-items:center;
    padding:24px 16px 40px;
  }
  h1{font-size:1.5rem;letter-spacing:.12em;font-weight:800;
     text-transform:uppercase;color:var(--accent);text-align:center}
  h1 small{display:block;font-size:.62rem;letter-spacing:.4em;color:var(--dim);margin-top:6px}

  .card{width:100%;max-width:480px;background:var(--panel);
        border:1px solid var(--line);border-radius:18px;padding:20px;margin-top:18px}

  label{display:block;font-size:.72rem;letter-spacing:.15em;text-transform:uppercase;
        color:var(--dim);margin-bottom:8px}
  input[type=text]{width:100%;background:#0d1017;border:1px solid var(--line);
        color:var(--ink);padding:12px 14px;border-radius:10px;font-size:.95rem}
  input[type=text]:focus{outline:none;border-color:var(--accent)}

  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .row.sub{margin-top:14px}
  .field{flex:1;min-width:120px}
  input[type=number]{width:100%;background:#0d1017;border:1px solid var(--line);
        color:var(--ink);padding:10px 12px;border-radius:10px;font-size:.95rem}

  button{font-family:inherit;cursor:pointer;border:none;border-radius:12px;
        font-weight:700;letter-spacing:.05em;transition:transform .08s,filter .15s}
  button:active{transform:translateY(2px)}
  button:disabled{opacity:.4;cursor:not-allowed}

  .btn-load{margin-top:16px;width:100%;background:var(--accent);color:#1a1300;
        padding:14px;font-size:1rem;text-transform:uppercase;letter-spacing:.1em}

  /* hide the real player completely */
  #ytwrap{position:fixed;left:-9999px;top:-9999px;width:1px;height:1px;overflow:hidden}

  /* stage */
  .stage{display:none;flex-direction:column;align-items:center;gap:22px;
         width:100%;max-width:480px;margin-top:22px}
  .stage.on{display:flex}

  .buzz{position:relative;width:220px;height:220px;border-radius:50%;
        background:radial-gradient(circle at 50% 35%,#1d2433,#0d1017);
        border:3px solid var(--line);display:flex;align-items:center;justify-content:center;
        flex-direction:column;gap:6px}
  .buzz.live{border-color:var(--ok);box-shadow:0 0 0 0 rgba(82,227,164,.5);
        animation:pulse 1s ease-out infinite}
  @keyframes pulse{to{box-shadow:0 0 0 26px rgba(82,227,164,0)}}
  .buzz .big{font-size:3rem;font-weight:900;color:var(--ink);font-variant-numeric:tabular-nums}
  .buzz .lbl{font-size:.7rem;letter-spacing:.3em;color:var(--dim);text-transform:uppercase}

  .countbar{width:100%;max-width:300px;height:8px;background:#0d1017;border-radius:99px;overflow:hidden}
  .countbar > i{display:block;height:100%;width:100%;background:var(--ok);transform-origin:left}

  .controls{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%}
  .btn-replay{background:#23344a;color:var(--ink);padding:16px;font-size:1rem}
  .btn-next{background:var(--accent2);color:#2b0008;padding:16px;font-size:1rem}
  .btn-wide{grid-column:1 / -1;background:#1a2030;color:var(--dim);
        border:1px solid var(--line);padding:11px;font-size:.78rem;letter-spacing:.1em;text-transform:uppercase}

  .meta{font-size:.72rem;color:var(--dim);letter-spacing:.1em}
  .err{color:var(--accent2);font-size:.8rem;margin-top:12px;min-height:1em;text-align:center}
  .hint{font-size:.72rem;color:var(--dim);line-height:1.6;margin-top:14px}
  .hint code{color:var(--accent);background:#0d1017;padding:1px 5px;border-radius:4px}
</style>
</head>
<body>
  <h1>估歌仔<small>Guess the Song</small></h1>

  <!-- SETUP -->
  <div class="card" id="setup">
    <label for="pl">YouTube 播放清單網址 / Playlist ID</label>
    <input type="text" id="pl" placeholder="貼上播放清單連結，或直接貼 PLxxxx 開頭的 ID">
    <div class="row sub">
      <div class="field">
        <label>每段秒數</label>
        <input type="number" id="dur" value="10" min="1" max="60">
      </div>
      <div class="field">
        <label>起點最低 %</label>
        <input type="number" id="lo" value="10" min="0" max="99">
      </div>
      <div class="field">
        <label>起點最高 %</label>
        <input type="number" id="hi" value="80" min="1" max="100">
      </div>
    </div>
    <button class="btn-load" id="load">載入播放清單</button>
    <div class="err" id="err"></div>
    <div class="hint">
      載入後畫面不會顯示任何歌曲名稱或影片。每首歌會從 10%–80% 之間的隨機位置播放固定秒數後自動停止，
      由你按 <code>下一首</code> 換歌，或按 <code>重播</code> 重聽同一段。
    </div>
  </div>

  <!-- GAME STAGE -->
  <div class="stage" id="stage">
    <button class="btn-load" id="begin" style="display:none">▶ 開始（點我播放）</button>
    <div class="buzz" id="buzz">
      <span class="big" id="count">–</span>
      <span class="lbl" id="state">準備</span>
    </div>
    <div class="countbar" id="cbar"><i id="bar"></i></div>
    <div class="controls" id="ctrls">
      <button class="btn-replay" id="replay">↺ 重播</button>
      <button class="btn-next" id="next">下一首 ▶</button>
      <button class="btn-wide" id="quit">結束 · 返回設定</button>
    </div>
    <div class="meta" id="meta"></div>
  </div>

  <!-- hidden player -->
  <div id="ytwrap"><div id="player"></div></div>

<script>
(function(){
  "use strict";
  var player=null, order=[], idx=-1, segSec=10, lo=0.10, hi=0.80;
  var startAt=0, timer=null, ticker=null, ready=false, pendingLoad=null;

  var $=function(id){return document.getElementById(id);};
  var setup=$("setup"), stage=$("stage"), buzz=$("buzz"),
      countEl=$("count"), stateEl=$("state"), bar=$("bar"), meta=$("meta"), errEl=$("err");

  function extractId(s){
    s=(s||"").trim();
    var m=s.match(/[?&]list=([^&]+)/);
    if(m) return m[1];
    if(/^[A-Za-z0-9_-]{10,}$/.test(s)) return s;
    return null;
  }

  // load YT API once
  var tag=document.createElement("script");
  tag.src="https://www.youtube.com/iframe_api";
  document.head.appendChild(tag);

  window.onYouTubeIframeAPIReady=function(){
    player=new YT.Player("player",{
      height:"1",width:"1",
      playerVars:{controls:0,disablekb:1,fs:0,modestbranding:1,rel:0},
      events:{
        onReady:function(){ ready=true; if(pendingLoad){pendingLoad();pendingLoad=null;} },
        onStateChange:onState,
        onError:function(){ skipBroken(); }
      }
    });
  };

  function onState(e){
    // when a freshly-cued video starts buffering/playing, jump to random spot
    if(e.data===YT.PlayerState.PLAYING && startAt<0){
      seekRandom();
    }
  }

  $("load").onclick=function(){
    errEl.textContent="";
    var id=extractId($("pl").value);
    if(!id){ errEl.textContent="無法辨識播放清單，請貼完整連結或 PL 開頭的 ID。"; return; }
    segSec=Math.max(1,parseInt($("dur").value,10)||10);
    lo=Math.min(99,Math.max(0,parseFloat($("lo").value)||0))/100;
    hi=Math.min(100,Math.max(1,parseFloat($("hi").value)||100))/100;
    if(hi<=lo){ errEl.textContent="起點最高 % 必須大於最低 %。"; return; }

    var go=function(){
      player.cuePlaylist({list:id, listType:"playlist"});
      // poll until playlist populates (mobile can be slow)
      var tries=0;
      var poll=setInterval(function(){
        tries++;
        var n=player.getPlaylist();
        if(n&&n.length){
          clearInterval(poll);
          order=shuffle(n.map(function(_,i){return i;}));
          idx=-1;
          setup.style.display="none";
          stage.classList.add("on");
          // show start button; user tap unlocks mobile playback
          $("begin").style.display="block";
          buzz.style.display="none"; $("cbar").style.display="none";
          $("ctrls").style.display="none"; meta.textContent="";
        }else if(tries>25){
          clearInterval(poll);
          errEl.textContent="載入失敗：清單為空、不公開，或載入逾時。請重試。";
        }
      },300);
    };
    if(ready) go(); else pendingLoad=go;
  };

  function shuffle(a){
    for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}
    return a;
  }

  function nextSong(){
    idx++;
    if(idx>=order.length){ order=shuffle(order); idx=0; }
    meta.textContent="第 "+(idx+1)+" / "+order.length+" 首";
    playSegment(true);
  }

  function playSegment(newRandom){
    clearTimers();
    buzz.classList.remove("live");
    stateEl.textContent="載入中";
    countEl.textContent="–";
    bar.style.transform="scaleX(1)";

    if(newRandom){
      startAt=-1; // flag: pick random on PLAYING
      player.playVideoAt(order[idx]);
    }else{
      // replay same spot
      player.seekTo(_lastSpot,true);
      player.playVideo();
      beginCountdown();
    }
  }

  var _lastSpot=0;
  function seekRandom(){
    var d=player.getDuration();
    if(!d||d<2){ startAt=0; return; }
    var spot=d*(lo+Math.random()*(hi-lo));
    _lastSpot=spot; startAt=0;
    player.seekTo(spot,true);
    beginCountdown();
  }

  function beginCountdown(){
    buzz.classList.add("live");
    stateEl.textContent="播放中";
    var remain=segSec;
    countEl.textContent=remain;
    bar.style.transition="none"; bar.style.transform="scaleX(1)";
    // force reflow then animate bar over segSec
    void bar.offsetWidth;
    bar.style.transition="transform "+segSec+"s linear";
    bar.style.transform="scaleX(0)";

    ticker=setInterval(function(){
      remain--; if(remain>=0) countEl.textContent=remain;
    },1000);
    timer=setTimeout(stopSegment,segSec*1000);
  }

  function stopSegment(){
    clearTimers();
    player.pauseVideo();
    buzz.classList.remove("live");
    stateEl.textContent="已停止";
    countEl.textContent="?";
  }

  function clearTimers(){
    if(timer){clearTimeout(timer);timer=null;}
    if(ticker){clearInterval(ticker);ticker=null;}
  }

  function skipBroken(){ /* on error just advance */ setTimeout(nextSong,300); }

  $("begin").onclick=function(){
    $("begin").style.display="none";
    buzz.style.display="flex"; $("cbar").style.display="block";
    $("ctrls").style.display="grid";
    nextSong();
  };
  $("replay").onclick=function(){ playSegment(false); };
  $("next").onclick=function(){ nextSong(); };
  $("quit").onclick=function(){
    clearTimers(); if(player&&player.stopVideo) player.stopVideo();
    stage.classList.remove("on"); setup.style.display="block";
  };
})();
</script>
</body>
</html>
